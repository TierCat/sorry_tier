<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knock Knock</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- หน้าแรก -->
    <div id="doorScene" class="center">

      <h1 class="title">
           🥺👉👈
        </h1>

        <h1 class="title">
            งอนอยู่หรอคะ
        </h1>


        <div class="door-frame">
            <div id="door">

                <div class="door-window"></div>

                <div class="door-line line1"></div>
                <div class="door-line line2"></div>
                <div class="door-line line3"></div>

                <div class="knob"></div>

            </div>
        </div>

        <p class="hint">
            เคาะประตูสองครั้งเพื่อเข้าไปข้างใน !!
        </p>

    </div>

    <!-- หน้าหลัก -->
    <div id="mainContent" class="hidden">

        <div class="card">

            <img src="begTier.png" class="beg-image" alt="beg">

            <h2 class="question">
                ยอมเค้าก่อนได้ม้ายย
            </h2>

            <div class="buttons">
                <button id="yesBtn">ยอมแล้วค้าบบ</button>
                <button id="noBtn">ไม่ยอม</button>
            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
